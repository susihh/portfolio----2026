<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Susana</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0ff;
      --card-bg: #ffffff;
      --text: #2d2d2d;
      --subtext: #666;
      --accent: #a855f7;
      --accent2: #ec4899;
      --shadow: rgba(168,85,247,0.15);
    }
    body.dark {
      --bg: #0f0f1a;
      --card-bg: #1a1a2e;
      --text: #f0f0f0;
      --subtext: #aaa;
      --shadow: rgba(168,85,247,0.3);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition:  0.4s, color 0.4s;
    }

    /* ── HEADER ── */
    header {
      position: relative;
      text-align: center;
      padding: 5rem 1rem 4rem;
      background: linear-gradient(135deg, #FF00E2 0%, #a855f7 45%, #6366f1 75%, #38bdf8 100%);
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 1.2rem;
    }
    .avatar-wrapper img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 5px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 0 8px rgba(255,255,255,0.15), 0 8px 30px rgba(0,0,0,0.3);
      object-fit: cover;
      display: block;
    }
    .avatar-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.5);
      animation: spin 12s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    header h1 { font-size: 2.8rem; font-weight: 700; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
    header p  { font-size: 1.1rem; color: rgba(255,255,255,0.85); margin-top: 0.4rem; font-weight: 300; }
    .badges { display: flex; justify-content: center; gap: 0.6rem; margin-top: 1.2rem; flex-wrap: wrap; }
    .badge {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(6px);
      color: #fff;
      padding: 0.3rem 0.9rem;
      border-radius: 50px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* ── CONTROLS ── */
    .controls {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin: 2.5rem 1rem 0;
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; max-width: 440px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; pointer-events: none; }
    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.8rem;
      border-radius: 50px;
      border: 2px solid transparent;
      background: var(--card-bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      box-shadow: 0 4px 15px var(--shadow);
      transition: border 0.3s;
      outline: none;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    .icon-btn {
      padding: 0.75rem 1.4rem;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      box-shadow: 0 4px 15px var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .icon-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--shadow); }

    /* ── ADD BUTTON (FAB) ── */
    .fab {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.8rem;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 25px rgba(168,85,247,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      transition: transform 0.3s, box-shadow 0.3s;
      animation: pulse 2.5s infinite;
    }
    .fab:hover { transform: scale(1.15) rotate(90deg); box-shadow: 0 10px 30px rgba(168,85,247,0.6); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 6px 25px rgba(168,85,247,0.5); }
      50% { box-shadow: 0 6px 40px rgba(236,72,153,0.7); }
    }
    .fab-tooltip {
      position: fixed;
      bottom: 2.4rem;
      right: 5.2rem;
      background: var(--card-bg);
      color: var(--text);
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      box-shadow: 0 4px 15px var(--shadow);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      white-space: nowrap;
      z-index: 998;
    }
    .fab:hover + .fab-tooltip { opacity: 1; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card-bg);
      border-radius: 22px;
      padding: 2.2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: modalIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
      position: relative;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.85) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.6rem;
    }
    .modal-header h3 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--subtext);
      line-height: 1;
      padding: 0.2rem;
      transition: transform 0.2s;
    }
    .modal-close:hover { transform: rotate(90deg); }

    .form-group { margin-bottom: 1.1rem; }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--subtext);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      border: 2px solid rgba(168,85,247,0.2);
      background: var(--bg);
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border 0.3s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .emoji-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.4rem;
    }
    .emoji-opt {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 2px solid rgba(168,85,247,0.2);
      background: var(--bg);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border 0.2s, transform 0.2s;
    }
    .emoji-opt:hover { transform: scale(1.1); }
    .emoji-opt.selected { border-color: var(--accent); background: rgba(168,85,247,0.1); }

    .modal-actions { display: flex; gap: 0.8rem; margin-top: 1.6rem; }
    .btn-cancel {
      flex: 1;
      padding: 0.8rem;
      border-radius: 10px;
      border: 2px solid rgba(168,85,247,0.3);
      background: transparent;
      color: var(--text);
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-cancel:hover { background: rgba(168,85,247,0.08); }
    .btn-save {
      flex: 2;
      padding: 0.8rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 6rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      padding: 0.7rem 1.6rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 6px 20px rgba(168,85,247,0.4);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 2000;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── SECTION TITLE ── */
    .section-title { text-align: center; margin: 2.5rem 0 0.5rem; font-size: 1.5rem; font-weight: 700; }
    .section-title span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .divider {
      display: block; width: 60px; height: 4px; border-radius: 4px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      margin: 0.5rem auto 2rem;
    }
    .project-count {
      text-align: center;
      font-size: 0.85rem;
      color: var(--subtext);
      margin-top: -1.5rem;
      margin-bottom: 2rem;
    }

    /* ── GRID ── */
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 1.2rem 6rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.6rem;
    }

    /* ── CARDS ── */
    .card {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 1.8rem;
      box-shadow: 0 6px 20px var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(168,85,247,0.1);
      animation: riseUp 0.6s forwards;
      opacity: 0;
      transform: translateY(28px);
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }
    .card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 12px 35px var(--shadow); }
    .card-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; margin-bottom: 1rem;
    }
    .card h2 { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 0.5rem; line-height: 1.4; }
    .card p  { font-size: 0.9rem; color: var(--subtext); line-height: 1.6; margin-bottom: 1.2rem; }
    .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .card a {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      text-decoration: none; font-weight: 600; font-size: 0.82rem;
      padding: 0.48rem 1rem; border-radius: 50px;
      transition: opacity 0.2s, transform 0.2s;
    }
    .card a:hover { opacity: 0.85; transform: translateX(2px); }
    .card-tag {
      position: absolute; top: 1rem; right: 1rem;
      background: rgba(168,85,247,0.1);
      color: var(--accent);
      font-size: 0.7rem; font-weight: 600;
      padding: 0.2rem 0.7rem; border-radius: 50px;
    }
    .btn-delete {
      background: none; border: none; cursor: pointer;
      color: #f87171; font-size: 1.1rem;
      padding: 0.3rem 0.5rem; border-radius: 8px;
      transition:  0.2s, transform 0.2s;
      line-height: 1;
    }
    .btn-delete:hover { background: rgba(248,113,113,0.12); transform: scale(1.2); }

    /* No results */
    #noResults { display: none; text-align: center; grid-column: 1 / -1; color: var(--subtext); padding: 3rem 0; }
    #noResults span { font-size: 2.5rem; display: block; margin-bottom: 0.5rem; }

    /* ── FOOTER ── */
    footer {
      text-align: center; padding: 2.5rem 1rem;
      background: var(--card-bg); font-size: 0.88rem; color: var(--subtext);
      border-top: 1px solid rgba(168,85,247,0.15);
    }
    .social-links { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1rem; }
    .social-links a {
      width: 38px; height: 38px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; text-decoration: none; transition: transform 0.2s;
    }
    .social-links a:hover { transform: translateY(-3px); }

    @keyframes riseUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>

    const DEFAULT_PROJECTS = [

      { id: 2, title: 'Projeto 2 — Propriedade Intelectual', desc: 'Protegendo a inovação e a criatividade — uma análise sobre direitos autorais e patentes.',           link: 'https://gamma.app/docs/Untitled-rqdm8o5hxt34jbd',                                                                          linkLabel: '📊 Ver Apresentação',   icon: '🛡️', tag: 'Apresentação' },
      { id: 3, title: 'Projeto 3 — Agenda Escolar',          desc: 'O papel essencial da agenda na organização do aluno — produtividade e planejamento escolar.',         link: 'https://gamma.app/docs/O-Papel-Essencial-da-Agenda-na-Organizacao-do-Aluno-p4n5jm6sjg3y83y',                          linkLabel: '📊 Ver Apresentação',   icon: '📅', tag: 'Apresentação' },
      { id: 4, title: 'Projeto 4 — Ecossistema de Startups', desc: 'O cenário global de inovação — tendências, desafios e oportunidades para empreendedores.',           link: 'https://gamma.app/docs/O-Ecossistema-de-Startups-em-2026-vfy98basn80knwh',                                              linkLabel: '📊 Ver Apresentação',   icon: '🚀', tag: 'Apresentação' },
      { id: 5, title: 'Projeto 5 — Álbum da Copa do Mundo', desc: 'Figurinhas, coleções e nostalgia! Um álbum digital interativo da Copa do Mundo.',                     link: 'https://susihh.github.io/album-da-copa/index.html',                                                                       linkLabel: '🔗 Ver no GitHub',      icon: '⚽', tag: 'Código' },
      { id: 6, title: 'Projeto 6 — Meu Primeiro App com Expo',  desc: 'Aprendendo a Usar o Snack Expo - testando',                                                      link: 'https://github.com/susihh/text-app-',                                                                       linkLabel: '🔗 Ver no GitHub',      icon: '⚡', tag: 'código' },
      { id: 7, title: 'Projeto 7 — APP de Troca de Imagens no Expo',  desc: 'Projeto de aprendisado expo',                                                      link: 'https://github.com/susihh/snack.expo',                                                                       linkLabel: '🔗 Ver no GitHub',      icon: '💻', tag: 'código' },
      { id: 8, title: 'Projeto 8 — .......',  desc: '........',                                                      documento: '2.cliente.json',                                                                       documentoLabel: '📄 Ver Documento',      icon: '💻', tag: 'código' },
  ];

    const EMOJIS = ['⚡','🚀','🛡️','📅','⚽','🎮','💡','🎨','📱','🔥','🌐','📊','🤖','🎵','🛒','💻','📝','🔬','🌍','🏆'];
    let selectedEmoji = '💡';

    /* ─────────────────────────────────────────
       STORAGE
    ───────────────────────────────────────── */
    function loadProjects() {
      const saved = localStorage.getItem('susana_projects');
      if (saved) return JSON.parse(saved);
      // Primeira vez: carrega padrões e salva
      localStorage.setItem('susana_projects', JSON.stringify(DEFAULT_PROJECTS));
      return DEFAULT_PROJECTS;
    }
    function saveProjects(list) {
      localStorage.setItem('susana_projects', JSON.stringify(list));
    }

    /* ─────────────────────────────────────────
       RENDER
    ───────────────────────────────────────── */
    let projects = loadProjects();

    function renderAll() {
      const grid = document.getElementById('projetos');
      const noR  = document.getElementById('noResults');
      const term = document.getElementById('search').value.toLowerCase().trim();

      // remove cards antigos
      grid.querySelectorAll('.card').forEach(c => c.remove());

      const filtered = projects.filter(p =>
        (p.title + p.desc + p.tag).toLowerCase().includes(term)
      );

      if (filtered.length === 0) {
        noR.style.display = 'block';
      } else {
        noR.style.display = 'none';
        filtered.forEach((p, i) => {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.animationDelay = (i * 0.08) + 's';
          card.innerHTML = `
            <span class="card-tag">${p.tag || 'Projeto'}</span>
            <div class="card-icon">${p.icon || '💡'}</div>
            <h2>${p.title}</h2>
            <p>${p.desc}</p>
            <div class="card-footer">
              <a href="${p.link}" target="_blank">${p.linkLabel || '🔗 Ver'}</a>
              <button class="btn-delete" title="Excluir projeto" data-id="${p.id}">🗑️</button>
            </div>
          `;
          grid.insertBefore(card, noR);
        });
      }

      // contagem
      document.getElementById('projectCount').textContent =
        projects.length === 0 ? 'Nenhum projeto ainda.'
        : `${projects.length} projeto${projects.length > 1 ? 's' : ''} no portfólio`;
    }

    /* ─────────────────────────────────────────
       EMOJI GRID no modal
    ───────────────────────────────────────── */
    function buildEmojiGrid() {
      const grid = document.getElementById('emojiGrid');
      grid.innerHTML = '';
      EMOJIS.forEach(e => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'emoji-opt' + (e === selectedEmoji ? ' selected' : '');
        btn.textContent = e;
        btn.addEventListener('click', () => {
          selectedEmoji = e;
          document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
        grid.appendChild(btn);
      });
    }

    /* ─────────────────────────────────────────
       MODAL
    ───────────────────────────────────────── */
    const overlay   = document.getElementById('modalOverlay');
    const fabBtn    = document.getElementById('fabBtn');
    const modalClose= document.getElementById('modalClose');
    const btnCancel = document.getElementById('btnCancel');
    const btnSave   = document.getElementById('btnSave');

    function openModal() {
      selectedEmoji = '💡';
      document.getElementById('inputTitle').value     = '';
      document.getElementById('inputDesc').value      = '';
      document.getElementById('inputLink').value      = '';
      document.getElementById('inputLinkLabel').value = '🔗 Ver no GitHub';
      buildEmojiGrid();
      overlay.classList.add('open');
      document.getElementById('inputTitle').focus();
    }
    function closeModal() { overlay.classList.remove('open'); }

    fabBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    btnCancel.addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

    /* SALVAR */
    btnSave.addEventListener('click', () => {
      const title     = document.getElementById('inputTitle').value.trim();
      const desc      = document.getElementById('inputDesc').value.trim();
      const link      = document.getElementById('inputLink').value.trim();
      const linkLabel = document.getElementById('inputLinkLabel').value;

      if (!title) { showToast('⚠️ Informe o título do projeto!'); return; }
      if (!link)  { showToast('⚠️ Informe o link do projeto!');   return; }

      const newProject = {
        id: Date.now(),
        title,
        desc: desc || 'Sem descrição.',
        link,
        linkLabel,
        icon: selectedEmoji,
        tag: linkLabel.includes('GitHub') ? 'Código' : linkLabel.includes('Apresentação') ? 'Apresentação' : 'Projeto'
      };

      projects.push(newProject);
      saveProjects(projects);
      renderAll();
      closeModal();
      showToast('✅ Projeto salvo com sucesso!');
    });

    /* ─────────────────────────────────────────
       DELETAR
    ───────────────────────────────────────── */
    document.getElementById('projetos').addEventListener('click', e => {
      const btn = e.target.closest('.btn-delete');
      if (!btn) return;
      const id = Number(btn.dataset.id);
      if (!confirm('Deseja remover este projeto?')) return;
      projects = projects.filter(p => p.id !== id);
      saveProjects(projects);
      renderAll();
      showToast('🗑️ Projeto removido.');
    });

    /* ─────────────────────────────────────────
       BUSCA
    ───────────────────────────────────────── */
    document.getElementById('search').addEventListener('input', renderAll);

    /* ─────────────────────────────────────────
       TEMA
    ───────────────────────────────────────── */
    const themeIcon = document.getElementById('themeIcon');
    let dark = localStorage.getItem('susana_theme') === 'dark';
    if (dark) { document.body.classList.add('dark'); themeIcon.textContent = '☀️'; }

    document.getElementById('toggleTheme').addEventListener('click', () => {
      dark = !dark;
      document.body.classList.toggle('dark', dark);
      themeIcon.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('susana_theme', dark ? 'dark' : 'light');
    });

    /* ─────────────────────────────────────────
       TOAST
    ───────────────────────────────────────── */
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    /* ─────────────────────────────────────────
       INIT
    ───────────────────────────────────────── */
    renderAll();
  </script>
</body>
</html>
